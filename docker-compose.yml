services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: marketplace_hub
      DB_USERNAME: marketplace_hub
      DB_PASSWORD: secret
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    depends_on:
      postgres:
        condition: service_healthy
    command: php artisan serve --host=0.0.0.0 --port=8000

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: marketplace_hub
      DB_USERNAME: marketplace_hub
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
    depends_on:
      postgres:
        condition: service_healthy
    command: php artisan queue:work database --sleep=3 --tries=3 --timeout=90

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: marketplace_hub
      DB_USERNAME: marketplace_hub
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
    depends_on:
      postgres:
        condition: service_healthy
    command: php artisan schedule:work

  postgres:
    image: postgres:16-alpine
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: marketplace_hub
      POSTGRES_USER: marketplace_hub
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace_hub -d marketplace_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
